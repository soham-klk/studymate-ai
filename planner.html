<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Planner</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
       
        body {
            background: linear-gradient(135deg, #fff, #076585);
        }

        .container { max-width: 1000px; margin-top: 50px; }
        .week-view { display: flex; flex-wrap: wrap; gap: 10px; }
        .day-column { flex: 1; min-width: 200px; border: 1px solid #ddd; padding: 10px; background: white; }
        .event { background: #e9ecef; margin-bottom: 5px; padding: 5px; border-radius: 4px; }
            #logo{
            height: 150px;
            width: 150px;
            border-radius: 10px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            margin-bottom: 20px;
            }

        #logo:hover {
            transform: scale(1.1);
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.2);
            filter: brightness(1.1);
        }
       
        
           #bn{
            background: linear-gradient(45deg, #31fff5, #4b12b4);
            border: none;
            border-radius: 30px;
            padding: 10px 20px;
            font-weight: 600;
            transition: all 0.3s ease;
            margin-top: 50px;
            margin-left: 50px;
                }
        #bn:hover {
            background: linear-gradient(45deg, #2ecc71, #27ae60);
            transform: scale(1.05);
            
        }
        .gradient-text {
            background: linear-gradient(135deg,#bf5ae0,#a811da);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
           
        }
        #title,h1{
            text-align: center;
        }
        #logo{
            align-items: start;
            height: 100px;
            width:100px;
            margin-left: 50px;
            margin-top: 50px;
        }
    </style>
</head>
<body>
    <button id="bn" onclick="window.location.href='index.html'">Back</button>
        <header><img src="plan.webp" alt="planner" id="logo"></header>
        <h1 class="text-6xl md:text-8xl lg:text-9xl font-black gradient-text mb-12 leading-tight tracking-tight drop-shadow-2xl">Study Planner</h1>
        
        
        <div id="title" class="card mb-4" style="font-family: sreda;">
            <div class="card-header">
                <h5>Add a New Event</h5>
            </div>
            <div class="card-body">
                <form id="eventForm">
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="title" class="form-label">Event Title</label>
                            <input type="text" class="form-control" id="title" placeholder="e.g., Math Class" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="type" class="form-label">Type</label>
                            <select class="form-select" id="type" required>
                                <option value="">Select...</option>
                                <option value="class">Class</option>
                                <option value="meeting">Meeting</option>
                                <option value="personal">Personal Task</option>
                            </select>
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-md-4 mb-3">
                            <label for="date" class="form-label">Date</label>
                            <input type="date" class="form-control" id="date" required>
                        </div>
                        <div class="col-md-4 mb-3">
                            <label for="startTime" class="form-label">Start Time</label>
                            <input type="time" class="form-control" id="startTime" required>
                        </div>
                        <div class="col-md-4 mb-3">
                            <label for="endTime" class="form-label">End Time</label>
                            <input type="time" class="form-control" id="endTime" required>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary">Add Event</button>
                </form>
            </div>
        </div>
        
       
        <h4 style="font-family: sreda;
            color: rgb(255, 252, 252);">Weekly Timetable</h4>
        <div class="week-view" id="weekView" style="font-family: sreda;">
           
        </div>
    </div>

   
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
        generateWeekView();
        loadEvents();
    });

    document.getElementById('eventForm').addEventListener('submit', function(e) {
        e.preventDefault();

        
        const form = document.getElementById('eventForm');

        const title = form.querySelector('input#title').value.trim();
        const type = form.querySelector('#type').value;
        const date = form.querySelector('#date').value;
        const startTime = form.querySelector('#startTime').value;
        const endTime = form.querySelector('#endTime').value;

        if (!title || !type || !date || !startTime || !endTime) {
            alert('Please fill all fields.');
            return;
        }

        if (startTime >= endTime) {
            alert('End time must be after start time.');
            return;
        }

        const event = {
            id: Date.now(),
            title,
            type,
            date,
            startTime,
            endTime
        };

        saveEvent(event);
        form.reset();
        loadEvents();
    });

    function saveEvent(event) {
        const events = JSON.parse(localStorage.getItem('sessions')) || [];
        events.push(event);
        localStorage.setItem('sessions', JSON.stringify(events));
    }

    function loadEvents() {
        const events = JSON.parse(localStorage.getItem('sessions')) || [];
        document.querySelectorAll('.event').forEach(el => el.remove());

        events.forEach(event => {
            const eventDate = new Date(event.date);
            const dayName = eventDate.toLocaleDateString('en-US', { weekday: 'long' });
            const dayColumn = document.querySelector(`[data-day="${dayName}"]`);

            if (dayColumn) {
                const eventDiv = document.createElement('div');
                eventDiv.className = 'event';
                eventDiv.innerHTML = `
                    <strong>${event.title}</strong> (${event.type})<br>
                    ${event.startTime} - ${event.endTime}
                    <button class="btn btn-sm btn-danger ms-2" onclick="deleteEvent(${event.id})">Delete</button>
                `;
                dayColumn.appendChild(eventDiv);
            }
        });
    }

    function deleteEvent(id) {
        let events = JSON.parse(localStorage.getItem('sessions')) || [];
        events = events.filter(ev => ev.id !== id);
        localStorage.setItem('sessions', JSON.stringify(events));
        loadEvents();
    }
    document.addEventListener('DOMContentLoaded', function () {
    
    document.querySelectorAll('input, textarea, select').forEach(el => {
        el.style.color = '#000';
    });
});

    function generateWeekView() {
        const weekView = document.getElementById('weekView');
        weekView.innerHTML = '';

        const days = ['Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday', 'Sunday'];
        const today = new Date();
        const startOfWeek = new Date(today.setDate(today.getDate() - today.getDay() + 1));

        days.forEach((day, index) => {
            const dayDate = new Date(startOfWeek);
            dayDate.setDate(startOfWeek.getDate() + index);

            const dayColumn = document.createElement('div');
            dayColumn.className = 'day-column';
            dayColumn.setAttribute('data-day', day);
            dayColumn.innerHTML = `<h6>${day}<br>${dayDate.toLocaleDateString()}</h6>`;
            weekView.appendChild(dayColumn);
        });
    }
</script>

</body>
</html>
